name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name uptimemonitoracr4000

      - name: Build and push image
        run: |
          docker build -t uptimemonitoracr4000.azurecr.io/uptime-monitor:${{ github.sha }} .
          docker build -t uptimemonitoracr4000.azurecr.io/uptime-monitor:latest .
          docker push uptimemonitoracr4000.azurecr.io/uptime-monitor:${{ github.sha }}
          docker push uptimemonitoracr4000.azurecr.io/uptime-monitor:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name uptime-monitor-app \
            --resource-group uptime-monitor-rg \
            --image uptimemonitoracr4000.azurecr.io/uptime-monitor:${{ github.sha }}
